name: Render Videos

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'Composition ID to render (ex: Video12-EP01-Short01)'
        required: true
        default: 'Video12-EP01-Short01'
        type: string
      concurrency:
        description: 'Remotion concurrency'
        required: false
        default: '2'
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Chromium for Remotion
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          npx remotion browser ensure

      - name: Render video
        run: |
          mkdir -p output
          echo "Rendering ${{ inputs.video_id }} with concurrency=${{ inputs.concurrency }}"
          npx remotion render src/index.ts "${{ inputs.video_id }}" "output/${{ inputs.video_id }}.mp4" --concurrency="${{ inputs.concurrency }}" --log=verbose
          ls -la output/

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.video_id }}
          path: output/${{ inputs.video_id }}.mp4
          retention-days: 7

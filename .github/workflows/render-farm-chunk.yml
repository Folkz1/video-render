name: Render Farm Chunk

on:
  workflow_dispatch:
    inputs:
      composition_id:
        description: 'Composition ID'
        required: true
        type: string
      start_frame:
        description: 'Start frame'
        required: true
        type: string
      end_frame:
        description: 'End frame'
        required: true
        type: string
      output_name:
        description: 'Artifact file name'
        required: true
        type: string

jobs:
  render-chunk:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          npx remotion browser ensure

      - name: Render chunk
        run: |
          npx remotion render src/index.ts "${{ inputs.composition_id }}" "output/${{ inputs.output_name }}" \
            --frames="${{ inputs.start_frame }}-${{ inputs.end_frame }}" \
            --concurrency=2 \
            --log=verbose

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_name }}
          path: output/${{ inputs.output_name }}
          retention-days: 3

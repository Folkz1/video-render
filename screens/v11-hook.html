<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #0a0a0f; color: #fff;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .timer-container {
    position: relative;
    width: 600px; height: 600px;
    display: flex; align-items: center; justify-content: center;
  }
  .circle {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 4px solid #111;
    border-top-color: #00ddff;
    animation: spin 4s linear infinite;
  }
  .circle2 {
    width: 90%; height: 90%;
    border-top-color: #00ddff; border-right-color: transparent; border-bottom-color: transparent; border-left-color: transparent;
    animation: spin 3s ease-in-out infinite reverse;
  }
  .text-number {
    font-size: 180px;
    font-weight: 900;
    color: #00ddff;
    text-shadow: 0 0 40px rgba(0, 221, 255, 0.5);
    z-index: 10;
  }
  .text-label {
    font-size: 64px;
    font-weight: 700;
    color: #fff;
    margin-top: -20px;
    z-index: 10;
    letter-spacing: 12px;
  }
  .content {
    display: flex; flex-direction: column; align-items: center;
  }
  @keyframes spin { 100% { transform: rotate(360deg); } }
  
  .glow {
    position: absolute;
    width: 800px; height: 800px;
    background: radial-gradient(circle, rgba(0, 221, 255, 0.15) 0%, transparent 70%);
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="glow"></div>
  <div class="timer-container">
    <div class="circle"></div>
    <div class="circle circle2"></div>
    <div class="content">
      <div class="text-number">3</div>
      <div class="text-label">SEMANAS</div>
    </div>
  </div>
</body>
</html>

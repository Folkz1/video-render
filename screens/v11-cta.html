<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #0a0a0f; color: #fff;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .bg-glow {
    position: absolute; width: 1000px; height: 1000px;
    background: radial-gradient(circle, rgba(0, 221, 255, 0.15) 0%, transparent 60%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    animation: pulse 3s infinite alternate;
  }
  @keyframes pulse { to { opacity: 0.5; transform: translate(-50%, -50%) scale(1.1); } }
  
  .content {
    z-index: 10; display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .headline { font-size: 80px; font-weight: 900; line-height: 1.1; margin-bottom: 20px; }
  .subheadline { font-size: 36px; font-weight: 700; color: #8899aa; margin-bottom: 80px; }
  .highlight { color: #00ddff; text-shadow: 0 0 30px rgba(0,221,255,0.5); }
  
  .cta-box {
    background: linear-gradient(135deg, #111, #1a1a24);
    border: 2px solid #333;
    padding: 60px 100px;
    border-radius: 24px;
    display: flex; gap: 60px;
    align-items: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 0 0 2px rgba(0,221,255,0.2);
    animation: slideUp 1s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
    transform: translateY(100px); opacity: 0;
  }
  @keyframes slideUp { to { transform: translateY(0); opacity: 1; } }
  
  .qr-placeholder {
    width: 200px; height: 200px; background: #fff; border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 10px;
  }
  .qr-inner { width: 100%; height: 100%; border: 8px dashed #aaa; border-radius: 8px; }
  
  .cta-text { display: flex; flex-direction: column; align-items: flex-start; }
  .cta-title { font-size: 48px; font-weight: 900; color: #00ddff; margin-bottom: 10px; }
  .cta-price { font-size: 64px; font-weight: 900; color: #fff; margin-bottom: 10px; }
  .cta-desc { font-size: 24px; color: #8899aa; font-weight: 700; }
  
  .urgency {
    margin-top: 60px; font-size: 28px; font-weight: 800; color: #ffaa00;
    padding: 15px 40px; border-radius: 50px; background: rgba(255, 170, 0, 0.1);
    animation: flash 2s infinite;
  }
  @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-glow"></div>
  <div class="content">
    <div class="headline">COMO OPERAR SEU NEGÓCIO <br><span class="highlight">COM AGENTES DE IA</span></div>
    <div class="subheadline">Pare de ser o gargalo da sua própria empresa.</div>
    
    <div class="cta-box">
      <div class="qr-placeholder">
        <div class="qr-inner"></div>
        <div style="color:#000; font-weight:900; font-size:14px; margin-top:5px;">SCAN ME</div>
      </div>
      <div class="cta-text">
        <div class="cta-title">CONSULTORIA ESTRATÉGICA</div>
        <div class="cta-price">R$ 500</div>
        <div class="cta-desc">Mapeamento de Gargalos + Plano de Automação</div>
      </div>
    </div>
    
    <div class="urgency">VAGAS LIMITADAS POR SEMANA</div>
  </div>
</body>
</html>

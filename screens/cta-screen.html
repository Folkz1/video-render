<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: #0a0a0f;
    font-family: 'Segoe UI', Inter, system-ui, sans-serif;
    color: #fff;
    display: flex; justify-content: center; align-items: center;
  }
  .grid-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.25;
    animation: pulse 4s ease-in-out infinite alternate;
  }
  .orb-1 { width: 500px; height: 500px; background: #00ff88; top: -200px; left: 50%; transform: translateX(-50%); }
  .orb-2 { width: 300px; height: 300px; background: #0088ff; bottom: -100px; right: -50px; animation-delay: 2s; }
  @keyframes pulse { from { opacity: 0.15; } to { opacity: 0.3; } }

  .content {
    text-align: center; position: relative; z-index: 2;
    opacity: 0; animation: fadeIn 1s ease forwards 0.5s;
  }

  .channel-name {
    font-size: 24px; text-transform: uppercase; letter-spacing: 8px; color: #667;
    margin-bottom: 20px;
  }

  .main-text {
    font-size: 64px; font-weight: 900; line-height: 1.2;
    margin-bottom: 30px;
  }
  .main-text span { color: #00ff88; }

  .sub-text {
    font-size: 24px; color: #aab; margin-bottom: 50px; font-weight: 300;
  }

  .cta-box {
    display: inline-flex; align-items: center; gap: 20px;
    padding: 24px 48px; border-radius: 16px;
    background: linear-gradient(135deg, #25d366, #128c3e);
    font-size: 28px; font-weight: 700;
    box-shadow: 0 0 40px rgba(37,211,102,0.3);
    opacity: 0; transform: scale(0.8);
    animation: ctaIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 2s;
  }
  @keyframes ctaIn { to { opacity: 1; transform: scale(1); } }

  .cta-icon { font-size: 36px; }

  .cta-subtext {
    font-size: 18px; color: #667; margin-top: 30px;
    opacity: 0; animation: fadeIn 0.8s ease forwards 3s;
  }

  .footer {
    position: absolute; bottom: 60px; left: 0; width: 100%;
    display: flex; justify-content: center; gap: 60px;
    opacity: 0; animation: fadeIn 0.8s ease forwards 3.5s;
  }
  .footer-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 18px; color: #556;
  }
  .footer-icon { font-size: 24px; }

  .badge-subscribe {
    display: inline-block; padding: 12px 32px; border-radius: 8px;
    background: #ff0000; font-size: 20px; font-weight: 700;
    margin-top: 20px;
    opacity: 0; animation: fadeIn 0.8s ease forwards 4s;
  }

  /* Floating particles */
  .particle {
    position: absolute; width: 4px; height: 4px; border-radius: 50%;
    background: #00ff88; opacity: 0;
    animation: float 6s linear infinite;
  }
  .p1 { left: 10%; animation-delay: 0s; top: 100%; }
  .p2 { left: 25%; animation-delay: 1s; top: 100%; }
  .p3 { left: 40%; animation-delay: 2s; top: 100%; }
  .p4 { left: 55%; animation-delay: 0.5s; top: 100%; }
  .p5 { left: 70%; animation-delay: 1.5s; top: 100%; }
  .p6 { left: 85%; animation-delay: 3s; top: 100%; }
  @keyframes float {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-1100px); opacity: 0; }
  }

  @keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>
<div class="particle p5"></div>
<div class="particle p6"></div>

<div class="content">
  <div class="channel-name">GUYFOLKZ</div>
  <div class="main-text">Quer um <span>Agente de IA</span><br>na sua empresa?</div>
  <div class="sub-text">Manda "AGENTE" no WhatsApp</div>

  <div class="cta-box">
    <span class="cta-icon">💬</span>
    WhatsApp: Link na Descricao
  </div>

  <div class="cta-subtext">Diagnostico gratuito de 15 minutos</div>

  <div class="badge-subscribe">INSCREVA-SE</div>
</div>

<div class="footer">
  <div class="footer-item"><span class="footer-icon">⚡</span> IA + Automacao</div>
  <div class="footer-item"><span class="footer-icon">🤖</span> Agentes Autonomos</div>
  <div class="footer-item"><span class="footer-icon">💰</span> B2B que gera receita</div>
</div>
</body>
</html>
